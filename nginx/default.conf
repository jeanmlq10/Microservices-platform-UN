# Incluir configuraciones dinámicas de microservicios
include /etc/nginx/dynamic/*.conf;

server {
    listen 80;
    server_name localhost;

    # ─── Frontend (Dashboard) ───
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts más largos para operaciones de build Docker
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ─── Microservicios Dinámicos ───
    # Cada microservicio se configura en /etc/nginx/dynamic/{name}.conf
    # con una location /services/{name} que apunta al contenedor correspondiente

    # ─── Health check ───
    location /health {
        access_log off;
        return 200 '{"status": "nginx ok"}';
        add_header Content-Type application/json;
    }
}
